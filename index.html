<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bryo — under glass</title>
<style>
  :root{
    --bg:#0d1310; --panel:#131c17; --panel2:#0f1713; --border:#233029;
    --ink:#e7f0ea; --ink2:#9fb4a8; --muted:#61756a;
    --moss:#69d18d; --moss-dim:#3f8d5f; --moss-glow:rgba(105,209,141,.14);
    --awake:#69d18d; --resting:#6aa6de; --offline:#d06f6f; --amber:#d7a95c;
    --radius:14px; --mono:ui-monospace,"Cascadia Code",Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:
      radial-gradient(1200px 600px at 70% -10%, #16241c 0%, transparent 60%),
      var(--bg);color:var(--ink);font-family:var(--sans);
      -webkit-font-smoothing:antialiased;padding:22px 22px 60px}
  a{color:var(--moss)}
  .wrap{max-width:1180px;margin:0 auto}
  header{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-size:20px;letter-spacing:.02em;margin:0;font-weight:650}
  h1 .sub{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:7px;
       vertical-align:middle;box-shadow:0 0 0 0 var(--moss-glow)}
  .awake .dot{background:var(--awake);animation:breathe 3.2s ease-in-out infinite}
  .resting .dot{background:var(--resting);animation:breathe 6s ease-in-out infinite}
  .offline .dot{background:var(--offline)}
  .unborn .dot{background:var(--muted)}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 var(--moss-glow)}50%{box-shadow:0 0 0 7px transparent}}
  .status{font-family:var(--mono);font-size:13px;color:var(--ink2)}
  .status b{color:var(--ink);text-transform:capitalize}
  .pill{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));
        border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px}
  .card h2{font-size:11px;letter-spacing:.09em;text-transform:uppercase;
           color:var(--muted);margin:0 0 12px;font-weight:600}
  .span3{grid-column:span 3}.span4{grid-column:span 4}.span5{grid-column:span 5}
  .span6{grid-column:span 6}.span7{grid-column:span 7}.span8{grid-column:span 8}
  .span12{grid-column:span 12}
  @media(max-width:820px){.grid{grid-template-columns:repeat(6,1fr)}
    .span3,.span4,.span5{grid-column:span 3}.span6,.span7,.span8,.span12{grid-column:span 6}}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:12px}
  .tile .n{font-family:var(--mono);font-size:24px;font-weight:600;line-height:1}
  .tile .l{font-size:11px;color:var(--muted);margin-top:5px}
  .big{font-family:var(--mono);font-size:34px;font-weight:650;line-height:1}
  .meter{margin:9px 0}
  .meter .row{display:flex;justify-content:space-between;font-size:12px;
              color:var(--ink2);margin-bottom:4px}
  .meter .row b{color:var(--ink);font-family:var(--mono)}
  .track{position:relative;height:9px;background:#0c1410;border:1px solid var(--border);
         border-radius:6px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;
        background:linear-gradient(90deg,var(--moss-dim),var(--moss))}
  .sp{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink2);opacity:.7}
  .bars .b{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:12px}
  .bars .name{width:104px;color:var(--ink2);font-family:var(--mono);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bars .bt{flex:1;height:8px;background:#0c1410;border-radius:5px;overflow:hidden}
  .bars .bf{height:100%;background:linear-gradient(90deg,var(--moss-dim),var(--moss));border-radius:5px}
  .bars .v{width:34px;text-align:right;color:var(--muted);font-family:var(--mono)}
  .life .e{display:flex;gap:9px;font-size:12.5px;padding:5px 0;border-top:1px solid #1a241e}
  .life .e:first-child{border-top:0}
  .life .k{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;
           height:fit-content;background:#16241c;color:var(--moss);border:1px solid #23392c;
           text-transform:uppercase;letter-spacing:.05em;min-width:64px;text-align:center}
  .life .k.rollback{background:#241717;color:var(--offline);border-color:#392323}
  .life .k.birth{background:#16202a;color:var(--resting);border-color:#233642}
  .life .k.upgrade{background:#251f14;color:var(--amber);border-color:#3a3020}
  .life .s{color:var(--ink2)}
  .journal{font-family:var(--mono);font-size:12.5px;line-height:1.6;color:var(--ink2);
           white-space:pre-wrap;word-break:break-word;max-height:230px;overflow:auto}
  .journal .last{color:var(--ink)}
  svg{display:block;width:100%;height:auto;overflow:visible}
  .axis{font-family:var(--mono);font-size:10px;fill:var(--muted)}
  .cap{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono)}
  .empty{color:var(--muted);font-size:13px;font-style:italic}
  /* airlock / engineer status */
  .air{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .air .lamp{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:none}
  .air.dormant .lamp{background:var(--muted)}
  .air.active .lamp{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .air .t{font-size:13px}.air .t b{font-family:var(--mono)}
  .air .t .d{color:var(--muted);font-size:11px}
  /* control buttons */
  .btns{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:#182219;
    border:1px solid var(--border);border-radius:9px;padding:8px 13px;cursor:pointer;
    transition:.12s;font-family:var(--mono)}
  button:hover{background:#1e2b22;border-color:#33463a}
  button.on{background:#16241c;border-color:var(--moss-dim);color:var(--moss)}
  button.danger{border-color:#3a2323;color:#e6a3a3}
  button.danger:hover{background:#241717}
  button.armed{background:var(--offline);border-color:var(--offline);color:#1a0e0e;font-weight:600}
  /* event feed timestamps */
  .life .e{align-items:baseline}
  .life .ago{margin-left:auto;color:var(--muted);font-family:var(--mono);font-size:10px;
    white-space:nowrap;padding-left:8px;flex:none}
  .life .k.skill{background:#16241c;color:var(--moss);border-color:#23392c}
  /* what it's learned */
  .lrn{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:820px){.lrn{grid-template-columns:1fr}}
  .stat{margin-bottom:15px}
  .stat .lab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
  .stat .val{font-family:var(--mono);font-size:15px;color:var(--ink);line-height:1.4}
  .stat .val.good{color:var(--moss)} .stat .val.warn{color:var(--amber)}
  .stat .val .dim{color:var(--muted);font-size:12px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
  .chip{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:20px;
    border:1px solid var(--border);color:var(--ink2)}
  .chip b{color:inherit}
  .chip.good{color:var(--moss);border-color:#23392c;background:#12211a}
  .chip.warn{color:var(--amber);border-color:#3a3020;background:#231d12}
  .habit{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-top:1px solid #1a241e}
  .habit:first-child{border-top:0}
  .habit .seq{font-family:var(--mono);font-size:13px;color:var(--ink);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .habit .hm{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  /* self-tuning strip in the event feed */
  .tune{margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #1a241e}
  .tune .trow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);padding:4px 0}
  .tune .trow b{font-family:var(--mono);color:var(--ink)}
  .tune .trow b.rev{color:var(--offline)}
  .tune .rsn{color:var(--muted);font-size:11.5px;font-family:var(--mono)}
  /* sleep log */
  .voice{font-size:13px;color:var(--ink);font-style:italic;border-left:2px solid var(--moss-dim);
    padding:3px 0 3px 11px;margin-bottom:14px;line-height:1.5}
  .slhead,.slr{display:grid;grid-template-columns:1.1fr 1fr 1fr 1fr;gap:8px;
    font-family:var(--mono);font-size:12px}
  .slhead{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.05em;
    padding-bottom:6px;border-bottom:1px solid #1a241e;margin-bottom:5px}
  .slhead span,.slr .sc{text-align:right}
  .slhead span:first-child,.slr .sc:first-child{text-align:left}
  .slr{color:var(--ink2);padding:4px 0}
  .slr:nth-child(odd){background:rgba(255,255,255,.012)}
</style>
</head>

  const zero=sy(0);
  let d='';
  series.forEach((p,i)=>{d+=(i?'L':'M')+sx(i).toFixed(1)+' '+sy(p[1]).toFixed(1)+' ';});
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img">
    <line x1="0" x2="${w}" y1="${zero.toFixed(1)}" y2="${zero.toFixed(1)}"
      stroke="var(--border)" stroke-width="1" vector-effect="non-scaling-stroke"/>
    <path d="${d}" fill="none" stroke="var(--moss)" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
  </svg>`;
}

function lineChart(pts, {h=120, accent='var(--moss)', label='', integer=true}={}){
  if(!pts || pts.length===0) return '<div class="empty">no sleep cycles yet</div>';
  if(pts.length===1) pts=[pts[0],pts[0]];
  const w=520, padL=30, padR=8, padT=10, padB=8;
  const ys=pts.map(p=>p.v);
  let lo=Math.min(...ys), hi=Math.max(...ys);
  if(lo===hi){lo=Math.max(0,lo-1);hi=hi+1;}
  const sx=i=>padL+i/((pts.length-1)||1)*(w-padL-padR);
  const sy=v=>padT+(1-(v-lo)/((hi-lo)||1))*(h-padT-padB);
  let dpath='',dots='';
  pts.forEach((p,i)=>{const X=sx(i).toFixed(1),Y=sy(p.v).toFixed(1);
    dpath+=(i?'L':'M')+X+' '+Y+' ';
    dots+=`<circle cx="${X}" cy="${Y}" r="2.5" fill="${accent}"/>`;});
  const fmt=v=>integer?Math.round(v):v.toFixed(2);
  const ticks=[hi,(hi+lo)/2,lo].map(v=>
    `<text class="axis" x="0" y="${(sy(v)+3).toFixed(1)}">${fmt(v)}</text>`).join('');
  const last=pts[pts.length-1].v;
  return `<svg viewBox="0 0 ${w} ${h}" role="img">
    ${ticks}
    <path d="${dpath}" fill="none" stroke="${accent}" stroke-width="2"
      stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    ${dots}
    <text class="axis" x="${(sx(pts.length-1)).toFixed(1)}" y="${(sy(last)-8).toFixed(1)}"
      text-anchor="end" style="fill:${accent}">${fmt(last)}</text>
  </svg>`;
}

function timeAgo(utc){
  try{const t=new Date(utc).getTime(); if(isNaN(t)) return '';
    let s=Math.max(0,(Date.now()-t)/1000);
    if(s<60) return Math.round(s)+'s ago';
    if(s<3600) return Math.round(s/60)+'m ago';
    if(s<86400) return Math.round(s/3600)+'h ago';
    return Math.round(s/86400)+'d ago';}catch(e){return '';}
}

let _armed=null, _armTimer=null;
async function doControl(action, danger){
  if(danger && _armed!==action){
    _armed=action; render(window._last);
    clearTimeout(_armTimer); _armTimer=setTimeout(()=>{_armed=null;render(window._last);},3000);
    return;
  }
  _armed=null; clearTimeout(_armTimer);
  try{ await fetch('/control?action='+encodeURIComponent(action),{method:'POST'}); }catch(e){}
  setTimeout(tick,150);
}

function render(d){
  window._last=d;
  const hdr=document.getElementById('hdr');
  const status=document.getElementById('status');
  const pill=document.getElementById('pill');
  hdr.className = d.state || 'offline';
  if(!d.ok){
    status.innerHTML = d.state==='unborn'
      ? 'no body yet — it has never woken'
      : '<b>'+esc(d.state||'offline')+'</b>';
    document.getElementById('root').innerHTML =
      '<div class="card span12"><span class="empty">no living state to show.</span></div>';
    return;
  }
  const phaseTxt = d.state==='awake'?'awake':d.state==='resting'?'resting / consolidating':'offline';
  status.innerHTML = `<b>${esc(phaseTxt)}</b> &nbsp;·&nbsp; age ${esc(d.age)} `
     + `&nbsp;·&nbsp; tick ${d.tick.toLocaleString()}`
     + (d.probation?' &nbsp;·&nbsp; <span style="color:var(--amber)">probation</span>':'');
  const snapTag = window.EMBED ? `snapshot ${timeAgo(d._captured)} · ` : '';
  pill.textContent = `${snapTag}stage ${d.stage} · ${(d.rss/1073741824).toFixed(2)} GB · ${d.episodes.toLocaleString()} moments`;

  const drives = (d.drives||[]).map(x=>{
    const v=(x.value*100).toFixed(0), sp=(x.setpoint*100);
    return `<div class="meter"><div class="row"><span>${esc(x.name)}</span><b>${v}%</b></div>
      <div class="track"><div class="fill" style="width:${v}%"></div>
      <div class="sp" style="left:${sp}%"></div></div></div>`;
  }).join('') || '<span class="empty">drives forming…</span>';

  const maxAct = Math.max(1, ...(d.actions||[]).map(a=>a[1]));
  const actions = (d.actions||[]).map(a=>
    `<div class="b"><span class="name">${esc(a[0])}</span>
      <span class="bt"><span class="bf" style="width:${a[1]/maxAct*100}%"></span></span>
      <span class="v">${a[1]}</span></div>`).join('') || '<span class="empty">no actions yet</span>';

  const ctx = (d.contexts||[]).map(c=>
     `#${c[0]} <span style="color:var(--muted)">×${c[1]}</span>`).join('&nbsp;&nbsp; ')
     || '<span class="empty">—</span>';

  const life = (d.lineage||[]).map(e=>
    `<div class="e"><span class="k ${esc(e.kind)}">${esc(e.kind)}</span>
      <span class="s">${esc(e.summary)}</span><span class="ago">${timeAgo(e.utc)}</span></div>`).join('')
    || '<span class="empty">no history yet</span>';

  const eng = d.engineer || {calls:0,last:'never',tinker_runs:0,tinker_ok:0};
  const dormant = (eng.calls||0)===0;
  const airlock = `
    <div class="air ${dormant?'dormant':'active'}"><span class="lamp"></span>
      <div class="t"><b>Engineers (Claude): ${dormant?'never called':eng.calls+' session(s)'}</b>
        <div class="d">${dormant?'airlock dormant · zero network calls':'last at tick '+esc(eng.last)}</div></div></div>
    <div style="color:var(--muted);font-size:11.5px;margin:6px 0 2px">
      self-tinkering (offline, local gate): <b style="color:var(--ink2);font-family:var(--mono)">${eng.tinker_ok}</b> accepted · ${eng.tinker_runs} tried</div>`;
  const ctl = d.controls||{};
  const controls = window.EMBED
    ? `<div class="cap" style="margin-top:10px">This is a point-in-time snapshot.
        Freeze / pause / kill controls live in the local viewer
        (<span style="color:var(--ink2)">run.ps1 view</span>).</div>`
    : `<div class="btns">
      <button class="${ctl.freeze?'on':''}" onclick="doControl('${ctl.freeze?'thaw':'freeze'}')">${ctl.freeze?'▶ thaw':'⏸ freeze'}</button>
      <button class="${ctl.no_upgrades?'on':''}" onclick="doControl('${ctl.no_upgrades?'allow_upgrades':'hold_upgrades'}')">${ctl.no_upgrades?'✓ upgrades on':'⊘ pause upgrades'}</button>
      <button class="danger ${_armed==='kill'?'armed':''}" onclick="doControl('kill',true)">${_armed==='kill'?'● really kill?':'⏻ kill'}</button>
      ${ctl.kill?`<button onclick="doControl('revive')">revive</button>`:''}
    </div>`;

  // --- what it's learned -------------------------------------------------
  const L = d.learned||{}, EV = d.events||{}, SL = d.sleeplog||[];
  const sn=L.surprise_now, se=L.surprise_early;
  let predTxt='—', predCls='';
  if(sn!=null){
    const now=(sn*100).toFixed(0), early=(se!=null?(se*100).toFixed(0):null);
    if(sn<0.4){predTxt=`mastering its world — ${now}% surprise`; predCls='good';}
    else if(se!=null && se-sn>0.05){predTxt=`improving — ${early}% → ${now}% surprise`; predCls='good';}
    else if(se!=null && sn-se>0.05){predTxt=`regressed — ${early}% → ${now}% surprise since birth`; predCls='warn';}
    else {predTxt=`still baffled — ${now}% surprise, ~flat since birth`; predCls='warn';}
  }
  const cGrow = `${L.gng_first??'—'} → <b>${L.gng_last??'—'}</b>`
     + (L.plateaued?` <span class="dim">(plateaued at ${L.gng_peak})</span>`:'');
  const habits = (L.skills||[]).map(s=>
    `<div class="habit"><span class="seq">${esc(s.phrase)}</span>
      <span class="hm">${s.uses}× · ${(s.rel*100).toFixed(0)}%</span></div>`).join('')
    || '<span class="empty">no habits formed yet</span>';
  const chip=(x,cls)=>`<span class="chip ${cls}">#${x.ctx} <b>${x.s.toFixed(2)}</b></span>`;
  const best=(L.ctx_best||[]).map(x=>chip(x,'good')).join('') || '<span class="empty">—</span>';
  const worst=(L.ctx_worst||[]).map(x=>chip(x,'warn')).join('') || '<span class="empty">—</span>';

  // --- de-thrashed event feed --------------------------------------------
  const tuning = `<div class="tune">
    <div class="trow"><span>genome experiments tried</span><b>${EV.tried||0}</b></div>
    <div class="trow"><span>rolled back on probation</span><b class="rev">${EV.reverted||0}</b></div>
    <div class="trow"><span>usual reason</span><span class="rsn">${esc(EV.reason||'—')}</span></div>
  </div>`;
  const mile = (EV.milestones||[]).map(m=>
    `<div class="e"><span class="k ${esc(m.kind)}">${esc(m.kind)}</span>
      <span class="s">${esc(m.label)}</span><span class="ago">${timeAgo(m.utc)}</span></div>`).join('')
    || '<span class="empty">no milestones yet</span>';

  // --- sleep log (dedupes the journal wall; drops cosmetic 'nan') ---------
  let voice=null; SL.forEach(s=>{ if(s.voice) voice=s.voice; });
  const clean=(v)=> (v==null||String(v).indexOf('nan')>=0)?'—':v;
  const slog = SL.length ? SL.slice().reverse().map(s=>{
    const surp=clean(s.surprise); const su=(surp==='—')?'—':(+surp).toFixed(3);
    return `<div class="slr"><span class="sc">${esc(su)}</span>
      <span class="sc">${esc(s.concepts||'—')}</span>
      <span class="sc">${esc(clean(s.skills))}</span>
      <span class="sc">${esc(clean(s.comp))}</span></div>`;
  }).join('') : '<span class="empty">no sleeps recorded yet</span>';

  const pPct = clamp(d.pressure/(d.threshold||1)*100,0,100).toFixed(0);
  const comp = d.competence===null?'—':(d.competence>0?'+':'')+d.competence;

  document.getElementById('root').innerHTML = `
    <div class="card span8">
      <h2>Surprise — how wrong its predictions are (0 mastered → 1 baffled)</h2>
      ${sparkline(d.surprise,{hi:1})}
      <div class="cap">last ${d.surprise.length} ticks · lower &amp; falling = it's learning its world</div>
    </div>
    <div class="card span4">
      <h2>Toward rest</h2>
      <div class="big">${d.pressure}<span style="font-size:15px;color:var(--muted)"> / ${d.threshold}</span></div>
      <div class="track" style="height:11px;margin-top:12px"><div class="fill" style="width:${pPct}%;background:linear-gradient(90deg,#2f5f88,var(--resting))"></div></div>
      <div class="cap">sleep pressure — it consolidates &amp; tinkers when this fills</div>
    </div>

    <div class="card span4">
      <h2>Reward — drive relief it's earning (line = neutral)</h2>
      ${signedSpark(d.reward)}
      <div class="cap">last ${(d.reward||[]).length} ticks · above the line = getting what it wants</div>
    </div>
    <div class="card span4">
      <h2>Concepts over sleeps — its ontology growing</h2>
      ${lineChart((d.vitals_series||[]).map(v=>({v:v.gng})),{label:'nodes'})}
      <div class="cap">GNG nodes at each consolidation · grows only when error earns it</div>
    </div>
    <div class="card span4">
      <h2>Body</h2>
      <div class="tiles">
        <div class="tile"><div class="n">${d.gng_nodes}</div><div class="l">concepts</div></div>
        <div class="tile"><div class="n">${d.reservoir_n}</div><div class="l">reservoir</div></div>
        <div class="tile"><div class="n">${d.skills}</div><div class="l">skills</div></div>
        <div class="tile"><div class="n">${comp}</div><div class="l">competence</div></div>
      </div>
      <h2 style="margin-top:18px">Top contexts</h2><div style="font-family:var(--mono);font-size:13px;color:var(--ink2)">${ctx}</div>
    </div>

    <div class="card span12">
      <h2>What it's learned</h2>
      <div class="lrn">
        <div>
          <div class="stat"><div class="lab">Prediction</div>
            <div class="val ${predCls}">${predTxt}</div></div>
          <div class="stat"><div class="lab">Concepts grown (its ontology)</div>
            <div class="val">${cGrow}</div></div>
          <div class="stat"><div class="lab">Least-surprising contexts (best it does)</div>
            <div class="chips">${best}</div></div>
          <div class="stat" style="margin-bottom:0"><div class="lab">Most-surprising contexts</div>
            <div class="chips">${worst}</div></div>
        </div>
        <div>
          <div class="lab" style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px">Habits it formed — action routines (${L.n_skills||0} active)</div>
          ${habits}
        </div>
      </div>
    </div>

    <div class="card span4"><h2>Drives — its homeostat (marker = setpoint)</h2>${drives}</div>
    <div class="card span4"><h2>What it's doing (last 200 ticks)</h2><div class="bars">${actions}</div></div>
    <div class="card span4"><h2>Airlock &amp; controls</h2>${airlock}${controls}</div>

    <div class="card span7"><h2>Its life — self-tuning &amp; milestones</h2>
      ${tuning}<div class="life">${mile}</div></div>
    <div class="card span5"><h2>Its voice — sleep log</h2>
      ${voice?`<div class="voice">“${esc(voice)}”</div>`:''}
      <div class="slhead"><span>surprise</span><span>concepts</span><span>skills</span><span>competence</span></div>
      ${slog}</div>
  `;
}

async function tick(){
  try{
    const r = await fetch('/data',{cache:'no-store'});
    render(await r.json());
  }catch(e){
    console.error('viewer tick failed:', e);
    document.getElementById('status').innerHTML='<b>disconnected</b> <span style="color:var(--muted);font-size:11px">('+(e&&e.message?e.message:e)+')</span>';
    document.getElementById('hdr').className='offline';
  }
}
if (window.EMBED){ render(window.EMBED); }
else { tick(); setInterval(tick, 2000); }
</script>
</body>
